services:
  youtube-downloader:
    build: .
    image: youtube-downloader:latest
    container_name: youtube-downloader
    restart: unless-stopped
    ports:
      - "8080:8080"
    # All tunables (proxy, bitrate, cover size, timeouts, cleanup, ...) are read
    # from .env if it exists. See .env.example for the full list. Optional so the
    # service still starts with no .env present.
    env_file:
      - path: .env
        required: false
    environment:
      # Cookies live in the mounted ./data dir; this path is tied to the volume
      # below, so it stays here rather than in .env.
      - YT_COOKIES=/data/cookies.txt
    volumes:
      # Persistent dir for cookies.txt (rw: yt-dlp rotates the session tokens).
      - ./data:/data
    tmpfs:
      # Downloads happen in /tmp (RAM, never written to disk). The size cap makes
      # it impossible to exhaust the host even if a job hangs.
      - /tmp:size=10g
