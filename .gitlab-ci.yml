stages:
  - lint
  - build

# Quick sanity check: the app must at least compile.
lint:
  stage: lint
  image: python:3.12-slim
  script:
    - python -m py_compile app.py
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# Build the Docker image and push it to the GitLab Container Registry.
build-image:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    # dind with TLS: the daemon listens on 2376 with certs under /certs/client.
    # Without these the docker client tries plain tcp://docker:2375 and fails
    # with "Cannot connect to the Docker daemon".
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_HOST: "tcp://docker:2376"
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: "/certs/client"
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - |
      TAGS="-t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
      [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ] && TAGS="$TAGS -t $CI_REGISTRY_IMAGE:latest"
      [ -n "$CI_COMMIT_TAG" ] && TAGS="$TAGS -t $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
      docker build $TAGS .
      docker push --all-tags "$CI_REGISTRY_IMAGE"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
