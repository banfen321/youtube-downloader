stages:
  - lint
  - build

# Quick sanity check: the app must at least compile.
lint:
  stage: lint
  image: python:3.12-slim
  script:
    - python -m py_compile app.py
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# Build the Docker image and push it to the GitLab Container Registry.
build-image:
  stage: build
  image: docker:27
  services:
    # Plain (non-TLS) dind. On this shared runner the TLS client certs aren't
    # shared into the job container, so TLS can't work. The docker:dind image
    # bakes in ENV DOCKER_TLS_CERTDIR=/certs, and a job-level variable does not
    # reliably override it inside the *service* container — so we force the value
    # empty in dind's own process via `env`. With it empty the entrypoint serves
    # the daemon unencrypted on tcp://0.0.0.0:2375 (plus the unix socket).
    - name: docker:27-dind
      alias: docker
      entrypoint: ["env", "DOCKER_TLS_CERTDIR=", "dockerd-entrypoint.sh"]
      command: ["--tls=false"]
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: "tcp://docker:2375"
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - |
      TAGS="-t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
      [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ] && TAGS="$TAGS -t $CI_REGISTRY_IMAGE:latest"
      [ -n "$CI_COMMIT_TAG" ] && TAGS="$TAGS -t $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
      docker build $TAGS .
      docker push --all-tags "$CI_REGISTRY_IMAGE"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
