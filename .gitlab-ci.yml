stages:
  - lint
  - build

# Quick sanity check: the app must at least compile.
lint:
  stage: lint
  image: python:3.12-slim
  script:
    - python -m py_compile app.py
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# Build the image with Kaniko and push it to the GitLab Container Registry.
# Kaniko builds in userspace — no Docker daemon, no docker-in-docker, no
# privileged mode — which sidesteps the dind/TLS problems on shared runners.
build-image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - |
      AUTH=$(printf '%s:%s' "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD" | base64 | tr -d '\n')
      printf '{"auths":{"%s":{"auth":"%s"}}}' "$CI_REGISTRY" "$AUTH" > /kaniko/.docker/config.json
    - |
      DEST="--destination $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
      [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ] && DEST="$DEST --destination $CI_REGISTRY_IMAGE:latest"
      [ -n "$CI_COMMIT_TAG" ] && DEST="$DEST --destination $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
      /kaniko/executor --context "$CI_PROJECT_DIR" --dockerfile "$CI_PROJECT_DIR/Dockerfile" $DEST
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
