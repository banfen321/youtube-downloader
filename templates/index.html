<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>YouTube → MP3</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 20px;
    font: 15px/1.5 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    background: #0e0f13; color: #e8e8ea;
  }
  .card {
    width: min(560px, 94vw); background: #16181d; border: 1px solid #262a33;
    border-radius: 14px; padding: 26px 24px; box-shadow: 0 12px 40px rgba(0,0,0,.45);
  }
  h1 { margin: 0 0 18px; font-size: 18px; letter-spacing: .3px; }
  h1 span { color: #ff4d4d; }
  label { display: block; font-size: 12px; color: #8a8f99; margin: 14px 0 6px; }
  input[type=url], input[type=text], select {
    width: 100%; padding: 11px 12px; background: #0e0f13; color: #e8e8ea;
    border: 1px solid #2c313b; border-radius: 9px; font: inherit; outline: none;
  }
  input:focus, select:focus { border-color: #ff4d4d; }
  .modes { display: flex; gap: 8px; margin-top: 6px; }
  .modes button {
    flex: 1; padding: 10px; border: 1px solid #2c313b; background: #0e0f13;
    color: #c7ccd6; border-radius: 9px; cursor: pointer; font: inherit;
  }
  .modes button.active { border-color: #ff4d4d; color: #fff; background: #2a1416; }
  #qwrap { display: none; }

  /* preview */
  #preview { display: none; margin-top: 18px; gap: 14px; }
  #preview.show { display: flex; }
  .coverbox {
    position: relative; width: 130px; height: 130px; flex: 0 0 130px;
    border: 1px dashed #3a4150; border-radius: 10px; overflow: hidden;
    background: #0e0f13; cursor: pointer; display: grid; place-items: center;
  }
  .coverbox.drag { border-color: #ff4d4d; background: #2a1416; }
  .coverbox img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .coverbox .ovl {
    position: absolute; inset: 0; display: grid; place-items: center; text-align: center;
    font-size: 10px; color: #8a8f99; padding: 8px; pointer-events: none;
    background: rgba(14,15,19,.55); opacity: 0; transition: .15s;
  }
  .coverbox:hover .ovl, .coverbox.empty .ovl { opacity: 1; }
  .coverbox .reset {
    position: absolute; top: 4px; right: 4px; width: 22px; height: 22px; border: 0;
    border-radius: 6px; background: rgba(0,0,0,.6); color: #fff; cursor: pointer;
    font-size: 12px; display: none;
  }
  .coverbox.custom .reset { display: block; }
  .fields { flex: 1; min-width: 0; }
  .fields label:first-child { margin-top: 0; }
  .dur { font-size: 11px; color: #6b7180; margin-top: 8px; }

  .go {
    width: 100%; margin-top: 20px; padding: 13px; border: 0; border-radius: 9px;
    background: #ff4d4d; color: #fff; font: inherit; font-weight: 600; cursor: pointer;
  }
  .go:disabled { opacity: .5; cursor: default; }
  .bar {
    height: 6px; background: #0e0f13; border: 1px solid #2c313b; border-radius: 6px;
    margin-top: 12px; overflow: hidden; display: none;
  }
  .bar.show { display: block; }
  .bar-fill {
    height: 100%; width: 0; background: #ff4d4d; border-radius: 6px; transition: width .25s;
  }
  .bar.indet .bar-fill {
    width: 35% !important; animation: slide 1.1s ease-in-out infinite;
  }
  @keyframes slide { 0% { margin-left: -35%; } 100% { margin-left: 100%; } }
  .status { margin-top: 14px; font-size: 13px; min-height: 18px; }
  .status.err { color: #ff6b6b; white-space: pre-wrap; }
  .status.ok { color: #5ad17a; }
  .spin {
    display: inline-block; width: 13px; height: 13px; border: 2px solid #ff4d4d40;
    border-top-color: #ff4d4d; border-radius: 50%; animation: s .7s linear infinite;
    vertical-align: -2px; margin-right: 7px;
  }
  @keyframes s { to { transform: rotate(360deg); } }

  .cookies { margin-top: 18px; border-top: 1px solid #262a33; padding-top: 12px; }
  .cookies summary { cursor: pointer; color: #8a8f99; font-size: 13px; }
  .cookies .hint { font-size: 11px; color: #6b7180; margin: 10px 0 8px; }
  .cookies code { color: #c7ccd6; }
  textarea {
    width: 100%; padding: 10px; background: #0e0f13; color: #e8e8ea;
    border: 1px solid #2c313b; border-radius: 9px; font: inherit; resize: vertical;
  }
  .go.ghost { background: #2c313b; margin-top: 10px; padding: 10px; }
</style>
</head>
<body>
  <div class="card">
    <h1>YouTube <span>→</span> MP3 / video</h1>

    <label>Link</label>
    <input type="url" id="url" placeholder="https://www.youtube.com/watch?v=…" autocomplete="off">

    <label>Format</label>
    <div class="modes" id="modes">
      <button data-mode="mp3" class="active">mp3 320k</button>
      <button data-mode="audio">audio (no re-encode)</button>
      <button data-mode="video">video</button>
    </div>

    <div id="qwrap">
      <label>Video quality</label>
      <select id="quality">
        <option value="best">best</option>
        <option value="2160">2160p</option>
        <option value="1440">1440p</option>
        <option value="1080">1080p</option>
        <option value="720">720p</option>
        <option value="480">480p</option>
      </select>
    </div>

    <div id="preview">
      <div class="coverbox empty" id="coverbox">
        <img id="cover" alt="" hidden>
        <div class="ovl">drop an image<br>or click</div>
        <button class="reset" id="resetCover" title="restore YouTube cover">↺</button>
        <input type="file" id="coverFile" accept="image/*" hidden>
      </div>
      <div class="fields">
        <label>Title</label>
        <input type="text" id="mTitle">
        <label>Artist</label>
        <input type="text" id="mArtist">
        <label>Album</label>
        <input type="text" id="mAlbum">
        <div class="dur" id="dur"></div>
      </div>
    </div>

    <button class="go" id="go">Download</button>
    <div class="bar" id="bar"><div class="bar-fill" id="barFill"></div></div>
    <div class="status" id="status"></div>

    <details class="cookies">
      <summary>🍪 Cookies (if it hits "not a bot")</summary>
      <p class="hint">Paste the <code>Cookie:</code> header from DevTools of a logged-in youtube.com tab.
      Best from an incognito window — export and close it right away, otherwise the session expires.</p>
      <textarea id="cookie" rows="4" placeholder="Cookie: SID=...; __Secure-1PSID=...; ..."></textarea>
      <button class="go ghost" id="saveCookies">Save cookies</button>
      <div class="status" id="cookieStatus"></div>
    </details>
  </div>

<script>
  let mode = "mp3";
  let baseThumb = null;     // YouTube cover (baseline)
  let customCover = null;   // custom cover (data URI) or null

  const $ = id => document.getElementById(id);
  const modesEl = $("modes"), qwrap = $("qwrap"), statusEl = $("status"), go = $("go");
  const urlEl = $("url"), preview = $("preview");
  const coverbox = $("coverbox"), coverImg = $("cover");

  modesEl.addEventListener("click", e => {
    const b = e.target.closest("button"); if (!b) return;
    mode = b.dataset.mode;
    [...modesEl.children].forEach(x => x.classList.toggle("active", x === b));
    qwrap.style.display = mode === "video" ? "block" : "none";
  });

  function setStatus(msg, cls) {
    statusEl.className = "status" + (cls ? " " + cls : "");
    statusEl.innerHTML = msg;
  }
  function fmtDur(s) {
    if (!s) return "";
    s = Math.round(s); const m = Math.floor(s / 60), ss = String(s % 60).padStart(2, "0");
    return `duration ${m}:${ss}`;
  }

  function setCover(dataUri, custom) {
    if (dataUri) {
      coverImg.src = dataUri; coverImg.hidden = false; coverbox.classList.remove("empty");
    } else {
      coverImg.hidden = true; coverbox.classList.add("empty");
    }
    coverbox.classList.toggle("custom", !!custom);
  }

  // ---- auto preview on link input ----
  let infoTimer = null, lastUrl = "";
  async function fetchInfo() {
    const url = urlEl.value.trim();
    if (!url || url === lastUrl) return;
    lastUrl = url;
    preview.classList.remove("show");
    setStatus('<span class="spin"></span>Fetching info…');
    try {
      const r = await fetch("/api/info", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url }),
      });
      const j = await r.json();
      if (!r.ok) { setStatus(j.error + (j.detail ? "\n\n" + j.detail : ""), "err"); return; }
      $("mTitle").value = j.title || "";
      $("mArtist").value = j.artist || "";
      $("mAlbum").value = j.album || "";
      $("dur").textContent = fmtDur(j.duration);
      baseThumb = j.thumb || null; customCover = null;
      setCover(baseThumb, false);
      preview.classList.add("show");
      setStatus("");
    } catch (e) { setStatus("Failed to fetch info: " + e.message, "err"); }
  }
  urlEl.addEventListener("input", () => { clearTimeout(infoTimer); infoTimer = setTimeout(fetchInfo, 700); });
  urlEl.addEventListener("paste", () => setTimeout(fetchInfo, 50));

  // ---- cover replace: click + drag-drop ----
  // silently shrink any image to <=1200px and re-encode to JPEG q0.85,
  // so the payload stays small and large files don't fail
  function loadFile(file) {
    if (!file || !file.type.startsWith("image/")) return;
    const fr = new FileReader();
    fr.onload = () => {
      const img = new Image();
      img.onload = () => {
        const MAX = 1200;
        let w = img.naturalWidth, h = img.naturalHeight;
        if (w > MAX || h > MAX) {
          const k = Math.min(MAX / w, MAX / h);
          w = Math.round(w * k); h = Math.round(h * k);
        }
        const c = document.createElement("canvas");
        c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        customCover = c.toDataURL("image/jpeg", 0.85);
        setCover(customCover, true);
      };
      img.onerror = () => setStatus("Couldn't read the image", "err");
      img.src = fr.result;
    };
    fr.readAsDataURL(file);
  }
  coverbox.addEventListener("click", e => { if (e.target.id !== "resetCover") $("coverFile").click(); });
  $("coverFile").addEventListener("change", e => loadFile(e.target.files[0]));
  $("resetCover").addEventListener("click", e => {
    e.stopPropagation(); customCover = null; setCover(baseThumb, false);
  });
  ["dragenter", "dragover"].forEach(ev =>
    coverbox.addEventListener(ev, e => { e.preventDefault(); coverbox.classList.add("drag"); }));
  ["dragleave", "drop"].forEach(ev =>
    coverbox.addEventListener(ev, e => { e.preventDefault(); coverbox.classList.remove("drag"); }));
  coverbox.addEventListener("drop", e => loadFile(e.dataTransfer.files[0]));

  // ---- download ----
  const bar = $("bar"), barFill = $("barFill");
  const STAGE = { init: "Preparing", download: "Downloading",
                  convert: "Converting", finalize: "Tags & cover" };

  function setBar(pct) {
    if (pct == null) { bar.classList.add("indet"); }
    else { bar.classList.remove("indet"); barFill.style.width = pct + "%"; }
  }

  go.addEventListener("click", async () => {
    const url = urlEl.value.trim();
    if (!url) { setStatus("Paste a link", "err"); return; }
    const payload = {
      url, mode, quality: $("quality").value,
      meta: { title: $("mTitle").value, artist: $("mArtist").value, album: $("mAlbum").value },
      cover: customCover,
    };
    go.disabled = true;
    bar.classList.add("show"); setBar(0);
    setStatus('<span class="spin"></span>Starting…');
    try {
      const r = await fetch("/api/download", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const j0 = await r.json();
      if (!r.ok) { setStatus(j0.error || ("Error " + r.status), "err"); cleanupBar(); return; }
      pollProgress(j0.job_id);
    } catch (e) {
      setStatus("Network/server unavailable: " + e.message, "err"); cleanupBar();
    }
  });

  function cleanupBar() {
    go.disabled = false; bar.classList.remove("show", "indet"); barFill.style.width = "0";
  }

  async function pollProgress(jobId) {
    try {
      const r = await fetch("/api/progress/" + jobId);
      const j = await r.json();
      if (!r.ok) { setStatus(j.error || "Progress error", "err"); cleanupBar(); return; }

      if (j.status === "running") {
        setBar(j.percent);
        const stage = STAGE[j.stage] || "Processing";
        let txt = `<span class="spin"></span>${stage}`;
        if (j.percent != null) {
          txt += ` ${j.percent.toFixed(1)}%`;
          if (j.stage === "download") {
            txt += (j.speed ? ` · ${j.speed}` : "") +
                   (j.total ? ` · ${j.downloaded}/${j.total}` : "");
          }
        }
        setStatus(txt);
        setTimeout(() => pollProgress(jobId), 400);
      } else if (j.status === "done") {
        setBar(100);
        const a = document.createElement("a");
        a.href = "/api/result/" + jobId; a.click();   // browser downloads via Content-Disposition
        setStatus("Done ✓ file is downloading", "ok");
        setTimeout(cleanupBar, 1200);
      } else {
        setStatus("Error:\n" + (j.error || "unknown"), "err"); cleanupBar();
      }
    } catch (e) {
      setStatus("Connection lost: " + e.message, "err"); cleanupBar();
    }
  }
  urlEl.addEventListener("keydown", e => { if (e.key === "Enter") fetchInfo(); });

  // ---- cookies ----
  const cookieStatus = $("cookieStatus");
  $("saveCookies").addEventListener("click", async () => {
    const cookie = $("cookie").value.trim();
    if (!cookie) { cookieStatus.className = "status err"; cookieStatus.textContent = "Empty"; return; }
    try {
      const r = await fetch("/api/cookies", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ cookie }),
      });
      const j = await r.json();
      if (!r.ok) { cookieStatus.className = "status err"; cookieStatus.textContent = j.error; return; }
      cookieStatus.className = "status ok";
      cookieStatus.textContent = `Saved: ${j.count} cookies` +
        (j.authenticated ? " (session authenticated ✓)" : " ⚠ no SID — not logged in");
    } catch (e) { cookieStatus.className = "status err"; cookieStatus.textContent = e.message; }
  });
</script>
</body>
</html>
